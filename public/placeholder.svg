<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#1a1a1a"/>
  <rect width="600" height="400" fill="url(#grid)" opacity="0.06"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f97316" stroke-width="0.5"/>
    </pattern>
  </defs>
  <!-- D20 shape -->
  <g transform="translate(300,185)">
    <polygon points="0,-72 62,-36 62,36 0,72 -62,36 -62,-36" fill="none" stroke="#f97316" stroke-width="2" opacity="0.6"/>
    <polygon points="0,-72 62,-36 0,-10" fill="#f97316" opacity="0.08"/>
    <polygon points="62,-36 62,36 0,-10" fill="#f97316" opacity="0.05"/>
    <polygon points="62,36 0,72 0,-10" fill="#f97316" opacity="0.08"/>
    <polygon points="0,72 -62,36 0,-10" fill="#f97316" opacity="0.05"/>
    <polygon points="-62,36 -62,-36 0,-10" fill="#f97316" opacity="0.08"/>
    <polygon points="-62,-36 0,-72 0,-10" fill="#f97316" opacity="0.05"/>
    <!-- inner lines -->
    <line x1="0" y1="-72" x2="0" y2="-10" stroke="#f97316" stroke-width="1" opacity="0.4"/>
    <line x1="62" y1="-36" x2="0" y2="-10" stroke="#f97316" stroke-width="1" opacity="0.4"/>
    <line x1="62" y1="36" x2="0" y2="-10" stroke="#f97316" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="72" x2="0" y2="-10" stroke="#f97316" stroke-width="1" opacity="0.4"/>
    <line x1="-62" y1="36" x2="0" y2="-10" stroke="#f97316" stroke-width="1" opacity="0.4"/>
    <line x1="-62" y1="-36" x2="0" y2="-10" stroke="#f97316" stroke-width="1" opacity="0.4"/>
    <!-- 20 label -->
    <text x="0" y="6" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#f97316" opacity="0.7">20</text>
  </g>
  <!-- Bottom text -->
  <text x="300" y="305" text-anchor="middle" font-family="Georgia, serif" font-size="15" letter-spacing="4" fill="#555" text-transform="uppercase">NO IMAGE</text>
  <text x="300" y="328" text-anchor="middle" font-family="Georgia, serif" font-size="11" letter-spacing="2" fill="#3a3a3a">DUNGEON PRINTS</text>
</svg>
